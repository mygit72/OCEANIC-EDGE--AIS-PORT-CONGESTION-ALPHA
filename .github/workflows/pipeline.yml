name: Oceanic Edge — AIS Pipeline

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:       # Manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AIS pipeline
        env:
          MARINETRAFFIC_API_KEY: ${{ secrets.MARINETRAFFIC_API_KEY }}
        run: |
          python pipeline/ais_pipeline.py $MARINETRAFFIC_API_KEY
          # If live API unavailable, fall back to simulator
          python pipeline/simulator.py || true

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: hourly AIS update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
